<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="800" viewBox="0 0 1000 800">
  <!-- 背景 -->
  <rect width="1000" height="800" fill="#0f172a"/>
  
  <!-- 网格线 - 增强科技感 -->
  <g opacity="0.1">
    <path d="M0 0 L1000 0 L1000 800 L0 800 Z" fill="none" stroke="#3b82f6" stroke-width="1"/>
    <!-- 垂直线 -->
    <path d="M100 0 L100 800" stroke="#3b82f6" stroke-width="1"/>
    <path d="M200 0 L200 800" stroke="#3b82f6" stroke-width="1"/>
    <path d="M300 0 L300 800" stroke="#3b82f6" stroke-width="1"/>
    <path d="M400 0 L400 800" stroke="#3b82f6" stroke-width="1"/>
    <path d="M500 0 L500 800" stroke="#3b82f6" stroke-width="1"/>
    <path d="M600 0 L600 800" stroke="#3b82f6" stroke-width="1"/>
    <path d="M700 0 L700 800" stroke="#3b82f6" stroke-width="1"/>
    <path d="M800 0 L800 800" stroke="#3b82f6" stroke-width="1"/>
    <path d="M900 0 L900 800" stroke="#3b82f6" stroke-width="1"/>
    <!-- 水平线 -->
    <path d="M0 100 L1000 100" stroke="#3b82f6" stroke-width="1"/>
    <path d="M0 200 L1000 200" stroke="#3b82f6" stroke-width="1"/>
    <path d="M0 300 L1000 300" stroke="#3b82f6" stroke-width="1"/>
    <path d="M0 400 L1000 400" stroke="#3b82f6" stroke-width="1"/>
    <path d="M0 500 L1000 500" stroke="#3b82f6" stroke-width="1"/>
    <path d="M0 600 L1000 600" stroke="#3b82f6" stroke-width="1"/>
    <path d="M0 700 L1000 700" stroke="#3b82f6" stroke-width="1"/>
  </g>
  
  <!-- 主要河流 -->
  <path d="M100 150 C200 130, 300 170, 400 150 C500 130, 600 170, 700 150 C800 130, 900 170, 950 250 C930 350, 850 450, 800 550 C750 650, 700 700, 650 750" 
        fill="#1e40af" stroke="#2563eb" stroke-width="30" opacity="0.4"/>
  <path d="M300 450 C400 430, 500 470, 600 450 C700 430, 800 470, 850 550" 
        fill="#1e40af" stroke="#2563eb" stroke-width="20" opacity="0.4"/>
  
  <!-- 主要道路网络 - 高速公路 -->
  <path d="M50 200 L950 200" stroke="#93c5fd" stroke-width="6" opacity="0.8"/>
  <path d="M50 400 L950 400" stroke="#93c5fd" stroke-width="6" opacity="0.8"/>
  <path d="M50 600 L950 600" stroke="#93c5fd" stroke-width="6" opacity="0.8"/>
  <path d="M200 50 L200 750" stroke="#93c5fd" stroke-width="6" opacity="0.8"/>
  <path d="M400 50 L400 750" stroke="#93c5fd" stroke-width="6" opacity="0.8"/>
  <path d="M600 50 L600 750" stroke="#93c5fd" stroke-width="6" opacity="0.8"/>
  <path d="M800 50 L800 750" stroke="#93c5fd" stroke-width="6" opacity="0.8"/>
  
  <!-- 道路连接线和支路 -->
  <path d="M200 200 L400 300" stroke="#38bdf8" stroke-width="3" opacity="0.7"/>
  <path d="M400 200 L200 300" stroke="#38bdf8" stroke-width="3" opacity="0.7"/>
  <path d="M400 400 L600 300" stroke="#38bdf8" stroke-width="3" opacity="0.7"/>
  <path d="M600 400 L400 300" stroke="#38bdf8" stroke-width="3" opacity="0.7"/>
  <path d="M600 200 L800 300" stroke="#38bdf8" stroke-width="3" opacity="0.7"/>
  <path d="M800 200 L600 300" stroke="#38bdf8" stroke-width="3" opacity="0.7"/>
  <path d="M200 400 L400 500" stroke="#38bdf8" stroke-width="3" opacity="0.7"/>
  <path d="M400 400 L200 500" stroke="#38bdf8" stroke-width="3" opacity="0.7"/>
  <path d="M600 600 L800 500" stroke="#38bdf8" stroke-width="3" opacity="0.7"/>
  <path d="M800 600 L600 500" stroke="#38bdf8" stroke-width="3" opacity="0.7"/>
  
  <!-- 城市区域和街道网络 - 北部区域 -->
  <path d="M50 50 L350 150 L350 250 L50 150 Z" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M150 50 L250 50" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M50 100 L350 100" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M50 150 L350 150" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M50 200 L350 200" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M100 50 L100 250" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M200 50 L200 250" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M300 50 L300 250" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  
  <!-- 城市区域和街道网络 - 中部区域 -->
  <path d="M350 250 L650 150 L650 350 L350 450 Z" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M400 200 L400 400" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M500 200 L500 400" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M600 200 L600 400" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M350 250 L650 250" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M350 300 L650 300" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M350 350 L650 350" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  
  <!-- 城市区域和街道网络 - 南部区域 -->
  <path d="M650 350 L950 250 L950 450 L650 550 Z" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M700 300 L700 500" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M800 300 L800 500" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M900 300 L900 500" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M650 350 L950 350" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M650 400 L950 400" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M650 450 L950 450" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  
  <!-- 城市区域和街道网络 - 东部区域 -->
  <path d="M350 450 L650 550 L650 650 L350 750 Z" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M400 400 L400 700" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M500 400 L500 700" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M600 400 L600 700" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M350 450 L650 450" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M350 500 L650 500" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M350 550 L650 550" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M350 600 L650 600" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M350 650 L650 650" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <path d="M350 700 L650 700" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  
  <!-- 发光效果 - 十字路口 -->
  <circle cx="200" cy="200" r="8" fill="#0ea5e9" opacity="0.6"/>
  <circle cx="200" cy="400" r="8" fill="#0ea5e9" opacity="0.6"/>
  <circle cx="200" cy="600" r="8" fill="#0ea5e9" opacity="0.6"/>
  <circle cx="400" cy="200" r="8" fill="#0ea5e9" opacity="0.6"/>
  <circle cx="400" cy="400" r="8" fill="#0ea5e9" opacity="0.6"/>
  <circle cx="400" cy="600" r="8" fill="#0ea5e9" opacity="0.6"/>
  <circle cx="600" cy="200" r="8" fill="#0ea5e9" opacity="0.6"/>
  <circle cx="600" cy="400" r="8" fill="#0ea5e9" opacity="0.6"/>
  <circle cx="600" cy="600" r="8" fill="#0ea5e9" opacity="0.6"/>
  <circle cx="800" cy="200" r="8" fill="#0ea5e9" opacity="0.6"/>
  <circle cx="800" cy="400" r="8" fill="#0ea5e9" opacity="0.6"/>
  <circle cx="800" cy="600" r="8" fill="#0ea5e9" opacity="0.6"/>
  
  <!-- 道路事件标记点 - 模拟事故和拥堵点 -->
  <!-- 事故点 - 红色 -->
  <circle cx="350" cy="350" r="4" fill="#ef4444" opacity="0.9"/>
  <circle cx="350" cy="350" r="10" fill="#ef4444" opacity="0.3"/>
  <circle cx="750" cy="550" r="4" fill="#ef4444" opacity="0.9"/>
  <circle cx="750" cy="550" r="10" fill="#ef4444" opacity="0.3"/>
  
  <!-- 拥堵点 - 橙色 -->
  <circle cx="550" cy="250" r="4" fill="#f97316" opacity="0.9"/>
  <circle cx="550" cy="250" r="10" fill="#f97316" opacity="0.3"/>
  <circle cx="450" cy="650" r="4" fill="#f97316" opacity="0.9"/>
  <circle cx="450" cy="650" r="10" fill="#f97316" opacity="0.3"/>
  
  <!-- 预警点 - 黄色 -->
  <circle cx="150" cy="450" r="4" fill="#eab308" opacity="0.9"/>
  <circle cx="150" cy="450" r="10" fill="#eab308" opacity="0.3"/>
  <circle cx="850" cy="350" r="4" fill="#eab308" opacity="0.9"/>
  <circle cx="850" cy="350" r="10" fill="#eab308" opacity="0.3"/>
  
  <!-- 安全点 - 绿色 -->
  <circle cx="250" cy="150" r="3" fill="#22c55e" opacity="0.9"/>
  <circle cx="650" cy="450" r="3" fill="#22c55e" opacity="0.9"/>
  <circle cx="550" cy="750" r="3" fill="#22c55e" opacity="0.9"/>
  
  <!-- 道路名称标签 -->
  <text x="500" y="185" fill="#93c5fd" font-size="14" text-anchor="middle" opacity="0.7">高新大道</text>
  <text x="500" y="385" fill="#93c5fd" font-size="14" text-anchor="middle" opacity="0.7">智慧大道</text>
  <text x="500" y="585" fill="#93c5fd" font-size="14" text-anchor="middle" opacity="0.7">科技大道</text>
  <text x="185" y="400" fill="#93c5fd" font-size="14" text-anchor="end" opacity="0.7" transform="rotate(-90, 185, 400)">未来路</text>
  <text x="385" y="400" fill="#93c5fd" font-size="14" text-anchor="end" opacity="0.7" transform="rotate(-90, 385, 400)">创新路</text>
  <text x="585" y="400" fill="#93c5fd" font-size="14" text-anchor="end" opacity="0.7" transform="rotate(-90, 585, 400)">数字路</text>
  <text x="785" y="400" fill="#93c5fd" font-size="14" text-anchor="end" opacity="0.7" transform="rotate(-90, 785, 400)">智能路</text>
  
  <!-- 水域名称 -->
  <text x="500" y="240" fill="#38bdf8" font-size="16" text-anchor="middle" opacity="0.7">智慧河</text>
  <text x="550" y="480" fill="#38bdf8" font-size="12" text-anchor="middle" opacity="0.7">科技支流</text>
  
  <!-- 城市区域标签 -->
  <text x="200" y="150" fill="#0ea5e9" font-size="14" text-anchor="middle" opacity="0.7">高新区</text>
  <text x="500" y="300" fill="#0ea5e9" font-size="14" text-anchor="middle" opacity="0.7">智慧区</text>
  <text x="800" y="400" fill="#0ea5e9" font-size="14" text-anchor="middle" opacity="0.7">科技区</text>
  <text x="500" y="600" fill="#0ea5e9" font-size="14" text-anchor="middle" opacity="0.7">数字区</text>
</svg>